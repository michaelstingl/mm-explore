<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#E8743B"/>
  <!-- Stylized mountains (M+M as peaks over calm Adriatic) -->
  <!-- Background: lighter sun glow top-right -->
  <circle cx="400" cy="130" r="55" fill="#FAF4E8" opacity="0.22"/>
  <!-- Back range (darker, behind) -->
  <path d="M 40 360 L 140 230 L 200 290 L 280 200 L 340 280 L 420 220 L 472 300 L 472 400 L 40 400 Z"
        fill="#2E5266" opacity="0.55"/>
  <!-- Front range (lighter, forward) -->
  <path d="M 40 400 L 120 300 L 180 360 L 256 260 L 332 370 L 400 310 L 472 400 Z"
        fill="#FAF4E8"/>
  <!-- Base (sea line) -->
  <rect x="40" y="400" width="432" height="50" fill="#2E5266"/>
  <!-- M+M peaks initials embedded as small pennants -->
  <circle cx="256" cy="260" r="8" fill="#2E5266"/>
</svg>
