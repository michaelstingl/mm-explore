<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#E8743B"/>
  <!-- Sun glow top-right -->
  <circle cx="400" cy="130" r="55" fill="#FAF4E8" opacity="0.22"/>
  <!-- Back range (dark terra-brown, clearly distinct from water) -->
  <path d="M 40 360 L 140 230 L 200 290 L 280 200 L 340 280 L 420 220 L 472 300 L 472 380 L 40 380 Z"
        fill="#6B3A1F" opacity="0.85"/>
  <!-- Front range (cream) -->
  <path d="M 40 380 L 120 300 L 180 360 L 256 260 L 332 370 L 400 310 L 472 380 Z"
        fill="#FAF4E8"/>
  <!-- Water body (taller, lighter teal) -->
  <rect x="40" y="380" width="432" height="72" fill="#7BA8B5"/>
  <!-- Wave strokes -->
  <rect x="80" y="406" width="140" height="3" rx="1.5" fill="#FAF4E8" opacity="0.55"/>
  <rect x="260" y="418" width="100" height="3" rx="1.5" fill="#FAF4E8" opacity="0.45"/>
  <rect x="120" y="432" width="180" height="3" rx="1.5" fill="#FAF4E8" opacity="0.4"/>
  <rect x="340" y="432" width="80" height="3" rx="1.5" fill="#FAF4E8" opacity="0.4"/>
</svg>
