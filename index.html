<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="M+M Explore">
  <title>M+M Explore</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="./icons/icon-source.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..700&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/open-props/open-props.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script defer src="./app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app" x-cloak>
  <main :class="{ 'mode-discover': mode === 'discover' }">
    <header>
      <h1 x-text="bundle?.trip?.title || 'M+M Explore'"></h1>
      <div class="header-actions">
        <button
          x-show="bundle"
          @click="showDayPicker = true"
          :class="isSimulating ? 'day-btn simulating' : 'day-btn'"
          aria-label="Tag wählen">
          <span x-text="dayLabel(today)"></span>
        </button>
        <button
          x-show="isSimulating"
          @click.stop="resetDate()"
          class="date-reset"
          aria-label="Zurück zu heute">↺</button>
        <button @click="view = (view === 'settings' ? 'main' : 'settings')" class="icon-btn" :aria-label="view === 'settings' ? 'Schließen' : 'Einstellungen'">
          <span x-text="view === 'settings' ? '✕' : '⚙'"></span>
        </button>
      </div>
    </header>

    <!-- Update-verfügbar-Banner -->
    <div class="update-banner" x-show="updateAvailable" x-cloak>
      <span>Update verfügbar</span>
      <button @click="applyUpdate()" class="btn-primary">Jetzt laden</button>
    </div>

    <!-- iOS Install Hint -->
    <div x-show="showIOSInstallHint && view === 'main'" class="ios-hint" x-cloak>
      <div class="ios-hint-body">
        <strong>Zum Home-Bildschirm hinzufügen</strong>
        <p>
          Tippe unten auf <svg class="ios-share" viewBox="0 0 14 18" aria-hidden="true" focusable="false"><path d="M7 1 L7 11 M3.6 4.4 L7 1 L10.4 4.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.2 7 L2.2 16 L11.8 16 L11.8 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> <strong>Teilen</strong> →
          <strong>Zum Home-Bildschirm</strong>, um M+M Explore wie eine App zu nutzen.
        </p>
      </div>
      <button @click="dismissIOSHint()" aria-label="Hinweis ausblenden">✕</button>
    </div>

    <!-- Loading -->
    <template x-if="loading">
      <p>Lade…</p>
    </template>

    <!-- Empty state: kein Bundle, nicht in Settings -->
    <template x-if="!loading && !bundle && view !== 'settings'">
      <div class="empty">
        <p>Noch keine Reise eingerichtet.</p>
        <button @click="view = 'settings'" class="btn-primary">Einrichten</button>
      </div>
    </template>

    <!-- Settings -->
    <template x-if="view === 'settings'">
      <section class="settings">
        <div class="settings-header">
          <h2>Einstellungen</h2>
          <button @click="view = 'main'" class="btn-secondary">Fertig</button>
        </div>
        <label>
          Gist-URL
          <input type="url" x-model="gistUrl" placeholder="https://gist.githubusercontent.com/…/raw/travel-bundle-v1.json">
        </label>
        <button @click="saveGistUrl()" class="btn-primary">Speichern & laden</button>

        <hr>

        <label>
          Sprache / Locale
          <select @change="setLocaleOverride($event.target.value)">
            <template x-for="opt in localeOptions" :key="opt.value">
              <option
                :value="opt.value"
                :selected="opt.value === localeOverride"
                x-text="opt.value === 'auto' ? opt.label + ' (' + navigator.language + ')' : opt.label"></option>
            </template>
          </select>
        </label>

        <label>
          Navigation-App
          <select @change="setMapsApp($event.target.value)">
            <template x-for="opt in mapsApps" :key="opt.value">
              <option :value="opt.value" :selected="opt.value === mapsApp" x-text="opt.label"></option>
            </template>
          </select>
        </label>

        <hr>

        <button @click="shareTrip()" :disabled="!gistUrl" class="btn-primary">Reise teilen 📤</button>
        <p class="muted">Sendet einen Link, über den die App automatisch mit den Reisedaten startet.</p>

        <hr>

        <button @click="fetchBundle()" :disabled="!gistUrl" class="btn-secondary">
          <span x-text="bundleIsStale ? '⚠️ Jetzt neu laden' : 'Jetzt neu laden'"></span>
        </button>
        <p x-show="lastUpdated" class="muted" :class="bundleIsStale ? 'stale' : ''">
          Daten <span x-text="bundleAgeLabel"></span> ·
          <span x-text="lastUpdated && new Date(lastUpdated).toLocaleString(locale)"></span>
        </p>

        <hr>

        <label class="toggle-row">
          <span>Debug-Modus</span>
          <input type="checkbox" :checked="debugEnabled" @change="toggleDebug($event.target.checked)">
        </label>
        <p class="muted" x-show="debugEnabled">
          Verbose Console-Logs aktiv. Console-Alternative: <code>mmDebug(true/false)</code>.
        </p>

        <template x-if="debugEnabled">
          <div class="debug-panel">
            <div class="debug-header">
              <strong>Debug</strong>
              <div>
                <button @click="showDebug = !showDebug" class="btn-copy" x-text="showDebug ? 'Einklappen' : 'Anzeigen'"></button>
                <button @click="copyDebugSnapshot()" class="btn-copy">📋</button>
              </div>
            </div>
            <div class="debug-summary" x-show="build">
              <div><span class="muted">Version</span> <code x-text="build?.version"></code></div>
              <div x-show="build?.deployed_at">
                <span class="muted">Deployed</span>
                <span x-text="build && new Date(build.deployed_at).toLocaleString(locale)"></span>
              </div>
            </div>
            <div x-show="showDebug" class="debug-body">
              <div class="debug-row" x-show="build">
                <strong>Build</strong>
                <div>
                  <div>Version: <code x-text="build?.version"></code></div>
                  <div x-show="build?.commit_short">Commit: <code x-text="build?.commit_short"></code></div>
                  <div x-show="build?.commit_message">Message: <em x-text="build?.commit_message"></em></div>
                  <div x-show="build?.deployed_at">Deployed: <span x-text="build && new Date(build.deployed_at).toLocaleString(locale)"></span></div>
                </div>
              </div>
              <div class="debug-row">
                <strong>Runtime</strong>
                <div>
                  <div>Mode: <code x-text="mode"></code> <span x-show="manualOverride" class="muted">(override)</span></div>
                  <div>Date: <code x-text="today"></code> <span x-show="isSimulating" class="muted">(simulating)</span></div>
                  <div>Trip state: <code x-text="tripState"></code></div>
                  <div>Locale: <code x-text="locale"></code></div>
                  <div>Maps: <code x-text="mapsApp"></code></div>
                  <div>Standalone: <code x-text="isStandalone"></code> · iOS: <code x-text="isIOS"></code></div>
                  <div>Offline: <code x-text="offline"></code></div>
                  <div>UA: <code x-text="navigator.userAgent"></code></div>
                </div>
              </div>
              <div class="debug-row" x-show="bundle">
                <strong>Bundle</strong>
                <div>
                  <div>Trip: <code x-text="bundle?.trip?.title"></code></div>
                  <div>Days: <code x-text="bundle?.days?.length"></code></div>
                  <div>Drives: <code x-text="bundle?.drives?.length"></code> · Stays: <code x-text="bundle?.stays?.length"></code> · Places: <code x-text="bundle?.places?.length"></code></div>
                  <div>Age: <code x-text="bundleAgeLabel"></code></div>
                </div>
              </div>

              <div class="debug-row">
                <strong>Log</strong>
                <div>
                  <div class="debug-log-actions">
                    <span class="muted" x-text="debugLog.length + ' events'"></span>
                    <button @click="copyDebugLog()" class="btn-copy">📋</button>
                    <button @click="clearDebugLog()" class="btn-copy">✕</button>
                  </div>
                  <div class="debug-log">
                    <template x-for="entry in debugLog" :key="entry.ts">
                      <div class="log-entry" :class="'log-' + entry.cat">
                        <span class="log-ts" x-text="logTs(entry.ts)"></span>
                        <span class="log-cat" x-text="entry.cat"></span>
                        <span class="log-msg" x-text="entry.msg"></span>
                        <span x-show="entry.data" class="log-data" x-text="JSON.stringify(entry.data)"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <hr>

        <div class="maintenance">
          <button @click="purgeLocalStorage()" class="btn-secondary">localStorage leeren</button>
          <button @click="clearDebugLog()" class="btn-secondary">Debug-Log löschen</button>
        </div>
        <p class="muted">Map-Tiles bleiben im Service-Worker-Cache erhalten.</p>

        <hr>

        <button @click="resetApp()" class="danger">Reset (alles löschen)</button>
      </section>
    </template>

    <!-- Main -->
    <template x-if="view === 'main' && bundle">
      <section>
        <p x-show="offline" class="banner-offline">Offline — Daten vom letzten Laden</p>

        <!-- Erleben-Modus -->
        <template x-if="mode === 'explore'">
          <div>
            <template x-if="!bundle.places?.length">
              <div class="card">
                <p>Keine Orte im Bundle.</p>
              </div>
            </template>

            <template x-if="bundle.places?.length">
              <div>
                <label class="place-picker">
                  <span class="muted">Wo seid ihr gerade?</span>
                  <select
                    @change="selectPlace($event.target.value)"
                    :value="selectedPlace?.id || ''">
                    <template x-for="place in bundle.places" :key="place.id">
                      <option :value="place.id" :selected="place.id === selectedPlace?.id" x-text="place.name"></option>
                    </template>
                  </select>
                </label>

                <template x-if="selectedPlace">
                  <div>
                    <!-- Stays at this place -->
                    <template x-for="stay in staysAtPlace(selectedPlace.id)" :key="stay.id">
                      <article class="card stay-card" x-data="{ showDetails: false }">
                        <h3 x-text="stay.name"></h3>
                        <p class="muted" x-text="stay.address"></p>
                        <template x-if="stay.check_in">
                          <p class="muted">
                            <span>Check-in </span>
                            <span x-text="formatCheckin(stay.check_in)"></span>
                            <template x-if="stay.check_out">
                              <span x-text="' · bis ' + formatCheckin(stay.check_out)"></span>
                            </template>
                          </p>
                        </template>
                        <template x-if="stay.note">
                          <p class="muted stay-note" x-text="stay.note"></p>
                        </template>
                        <div class="stay-actions">
                          <template x-if="stay.maps_url">
                            <a :href="stay.maps_url" target="_blank" class="btn-primary">Route</a>
                          </template>
                          <template x-if="stay.phone">
                            <a :href="'tel:' + stay.phone" class="btn-secondary">Anrufen</a>
                          </template>
                          <button @click="showDetails = true" class="btn-secondary">Details</button>
                        </div>

                        <div x-show="showDetails" class="modal-backdrop" @click="showDetails = false" x-cloak>
                          <div class="modal" @click.stop>
                            <h3 x-text="stay.name"></h3>
                            <dl>
                              <div class="modal-row"><dt>Adresse</dt><dd x-text="stay.address"></dd></div>
                              <template x-if="stay.phone">
                                <div class="modal-row"><dt>Telefon</dt><dd x-text="stay.phone"></dd></div>
                              </template>
                              <template x-if="stay.check_in">
                                <div class="modal-row"><dt>Check-in</dt><dd x-text="formatCheckin(stay.check_in)"></dd></div>
                              </template>
                              <template x-if="stay.check_out">
                                <div class="modal-row"><dt>Check-out</dt><dd x-text="formatCheckin(stay.check_out)"></dd></div>
                              </template>
                              <template x-if="stay.booking?.provider">
                                <div class="modal-row"><dt>Provider</dt><dd x-text="stay.booking.provider"></dd></div>
                              </template>
                              <template x-if="stay.booking?.id">
                                <div class="modal-row"><dt>Buchung</dt><dd x-text="stay.booking.id"></dd></div>
                              </template>
                              <template x-if="stay.booking?.pin">
                                <div class="modal-row"><dt>PIN</dt><dd class="pin" x-text="stay.booking.pin"></dd></div>
                              </template>
                            </dl>
                            <button @click="showDetails = false" class="btn-primary">Schließen</button>
                          </div>
                        </div>
                      </article>
                    </template>

                    <!-- POI list -->
                    <template x-if="selectedPlace.pois?.length">
                      <article class="card">
                        <div class="poi-list-header">
                          <h3 x-text="'Orte in ' + selectedPlace.name"></h3>
                          <button
                            @click="showPlaceOnMap(selectedPlace)"
                            class="btn-copy cluster-shortcut"
                            :aria-label="'Alle Orte in ' + selectedPlace.name + ' auf Karte'">
                            <span aria-hidden="true">🗺️</span> Alle
                          </button>
                        </div>
                        <ul class="poi-list">
                          <template x-for="poi in selectedPlace.pois" :key="poi.name">
                            <li class="poi">
                              <div class="poi-icon" x-text="poiIcon(poi.type)"></div>
                              <div class="poi-main">
                                <strong x-text="poi.name"></strong>
                                <template x-if="poi.note">
                                  <p class="muted poi-note" x-text="poi.note"></p>
                                </template>
                              </div>
                              <div class="poi-actions">
                                <button @click="copyLocation(poi)" class="btn-copy" aria-label="Ort kopieren">📋</button>
                                <template x-if="poi.coords">
                                  <button @click="showPoiOnMap(poi)" class="btn-copy" aria-label="Auf Karte zeigen">🗺️</button>
                                </template>
                                <template x-if="poi.maps_url || poi.coords">
                                  <a :href="mapsUrl(poi, 'nav') || poi.maps_url" target="_blank" class="poi-link" aria-label="In Maps-App öffnen" @click="logMapsClick(poi, 'nav')">🚙</a>
                                </template>
                              </div>
                            </li>
                          </template>
                        </ul>
                      </article>
                    </template>

                    <!-- Empty state for this place -->
                    <template x-if="!selectedPlace.pois?.length && !staysAtPlace(selectedPlace.id).length">
                      <div class="card">
                        <p>Für <strong x-text="selectedPlace.name"></strong> ist noch nichts hinterlegt.</p>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>

        <!-- Entdecken-Modus (Karte) —
             x-show (not x-if) so the Leaflet container stays mounted across
             tab switches. Otherwise Leaflet holds a ref to a torn-down DOM
             node and the map renders blank on re-entry. -->
        <div x-show="mode === 'discover'" class="discover" x-cloak>
          <div id="map" class="map"></div>
        </div>

        <!-- Unterwegs-Modus -->
        <template x-if="mode === 'transit'">
          <div>
            <!-- Trip not yet started -->
            <template x-if="tripState === 'before'">
              <div class="card">
                <h2>Noch nicht losgefahren</h2>
                <p>
                  Die Reise beginnt am
                  <button class="inline-date" @click="pickDate(bundle.trip.from_date)" x-text="formatFullDate(bundle.trip.from_date)"></button>.
                </p>
              </div>
            </template>

            <!-- Trip finished -->
            <template x-if="tripState === 'after'">
              <div class="card">
                <h2>Reise vorbei</h2>
                <p>Hoffe es war schön 💛</p>
                <p class="muted">
                  <button class="inline-date" @click="pickDate(bundle.trip.to_date)">Letzter Tag</button>
                  <span x-text="' · ' + formatFullDate(bundle.trip.to_date)"></span>
                </p>
              </div>
            </template>

            <!-- During trip: travel day -->
            <template x-if="tripState === 'during' && todayDay?.drive_id">
              <div
                x-data="{ drive: findDrive(todayDay.drive_id), stay: todayDay.stay_id ? findStay(todayDay.stay_id) : null, showDetails: false }"
                x-init="$watch('todayDay', d => { drive = findDrive(d?.drive_id); stay = d?.stay_id ? findStay(d.stay_id) : null; })">
                <!-- Candidate alternatives (Kal-2 fork etc.) -->
                <template x-if="driveSiblings(drive.id).length > 1">
                  <div class="drive-alts">
                    <span class="alt-label">Noch nicht entschieden — Alternativen:</span>
                    <div class="alt-row">
                      <template x-for="alt in driveSiblings(drive.id)" :key="alt.id">
                        <button
                          class="alt-tab"
                          :class="{ active: alt.id === drive.id }"
                          @click="drive = alt"
                          :aria-pressed="alt.id === drive.id"
                          x-text="alt.to"></button>
                      </template>
                    </div>
                  </div>
                </template>

                <!-- Drive card -->
                <article class="card drive-card">
                  <h2 x-text="drive.from + ' → ' + drive.to"></h2>
                  <p class="drive-meta">
                    <template x-if="drive.km"><span x-text="drive.km + ' km'"></span></template>
                    <template x-if="drive.km && drive.duration_min"><span>·</span></template>
                    <template x-if="drive.duration_min"><span x-text="'~' + formatDuration(drive.duration_min) + ' h'"></span></template>
                  </p>
                  <template x-if="drive.route">
                    <p class="route" x-text="drive.route"></p>
                  </template>
                  <template x-if="drive.note">
                    <p class="muted" x-text="drive.note"></p>
                  </template>
                  <div class="inline-actions">
                    <template x-if="drive.maps_url || drive.coords">
                      <a :href="mapsUrl(drive, 'nav') || drive.maps_url" target="_blank" class="btn-primary" @click="logMapsClick(drive, 'nav')">Route öffnen</a>
                    </template>
                    <button @click="copyLocation({ name: drive.to, coords: drive.coords })" class="btn-copy" aria-label="Ziel kopieren">📋</button>
                  </div>

                  <template x-if="drive.stops?.length">
                    <div class="stops">
                      <h3>Ladestopps</h3>
                      <ul>
                        <template x-for="stop in drive.stops" :key="stop.name">
                          <li class="stop">
                            <div class="stop-main">
                              <strong x-text="stop.name"></strong>
                              <span class="muted" x-text="[stop.km_ab_start ? 'km ' + stop.km_ab_start : null, stop.kw ? stop.kw + ' kW' : null, stop.stop_min ? stop.stop_min + ' min' : null].filter(Boolean).join(' · ')"></span>
                              <template x-if="stop.note">
                                <span class="muted stop-note" x-text="stop.note"></span>
                              </template>
                            </div>
                            <div class="stop-actions">
                              <button @click="copyLocation(stop)" class="btn-copy" aria-label="Stopp kopieren">📋</button>
                              <template x-if="stop.maps_url || stop.coords">
                                <a :href="mapsUrl(stop, 'nav') || stop.maps_url" target="_blank" class="stop-link" aria-label="In Maps-App öffnen" @click="logMapsClick(stop, 'nav')">🚙</a>
                              </template>
                            </div>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </template>
                </article>

                <!-- Stay card -->
                <template x-if="stay">
                  <article class="card stay-card">
                    <h2>Heute Abend</h2>
                    <p class="stay-name" x-text="stay.name"></p>
                    <p class="muted" x-text="stay.address"></p>
                    <template x-if="stay.check_in">
                      <p>Check-in ab <span x-text="formatCheckin(stay.check_in)"></span></p>
                    </template>
                    <template x-if="stay.note">
                      <p class="muted stay-note" x-text="stay.note"></p>
                    </template>
                    <div class="stay-actions">
                      <template x-if="stay.maps_url || stay.coords">
                        <a :href="mapsUrl(stay, 'nav') || stay.maps_url" target="_blank" class="btn-primary" @click="logMapsClick(stay, 'nav')">Route</a>
                      </template>
                      <button @click="copyLocation(stay)" class="btn-secondary" aria-label="Adresse kopieren">📋</button>
                      <template x-if="stay.phone">
                        <a :href="'tel:' + stay.phone" class="btn-secondary">Anrufen</a>
                      </template>
                      <button @click="showDetails = true" class="btn-secondary">Details</button>
                    </div>

                    <!-- Detail-Modal -->
                    <div x-show="showDetails" class="modal-backdrop" @click="showDetails = false" x-cloak>
                      <div class="modal" @click.stop>
                        <h3 x-text="stay.name"></h3>
                        <dl>
                          <dt>Adresse</dt>
                          <dd x-text="stay.address"></dd>
                          <template x-if="stay.phone">
                            <div class="modal-row"><dt>Telefon</dt><dd x-text="stay.phone"></dd></div>
                          </template>
                          <template x-if="stay.check_in">
                            <div class="modal-row"><dt>Check-in</dt><dd x-text="formatCheckin(stay.check_in)"></dd></div>
                          </template>
                          <template x-if="stay.check_out">
                            <div class="modal-row"><dt>Check-out</dt><dd x-text="formatCheckin(stay.check_out)"></dd></div>
                          </template>
                          <template x-if="stay.booking?.provider">
                            <div class="modal-row"><dt>Provider</dt><dd x-text="stay.booking.provider"></dd></div>
                          </template>
                          <template x-if="stay.booking?.id">
                            <div class="modal-row"><dt>Buchung</dt><dd x-text="stay.booking.id"></dd></div>
                          </template>
                          <template x-if="stay.booking?.pin">
                            <div class="modal-row"><dt>PIN</dt><dd class="pin" x-text="stay.booking.pin"></dd></div>
                          </template>
                        </dl>
                        <button @click="showDetails = false" class="btn-primary">Schließen</button>
                      </div>
                    </div>
                  </article>
                </template>
              </div>
            </template>

            <!-- During trip, NO drive today -->
            <template x-if="tripState === 'during' && !todayDay?.drive_id">
              <div class="card">
                <p>Heute kein Reisetag.</p>
                <template x-if="todayDay">
                  <p class="muted" x-text="todayDay.title"></p>
                </template>
                <button @click="setMode('explore')" class="btn-primary">Zu „Erleben" wechseln</button>
              </div>
            </template>
          </div>
        </template>
      </section>
    </template>
  </main>

  <!-- Day Picker Sheet — lives outside <main> for the same reason as the
       tab bar and toast: <main>'s page-in transform creates a containing
       block for position:fixed descendants, which otherwise pins the
       backdrop to <main>'s scroll position instead of the viewport. -->
  <div x-show="showDayPicker" class="sheet-backdrop" @click="showDayPicker = false" x-cloak>
    <div class="sheet" @click.stop>
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2>Tag wählen</h2>
        <button @click="showDayPicker = false" class="icon-btn" aria-label="Schließen">✕</button>
      </div>
      <div class="month-list">
        <template x-for="month in calendarMonths" :key="month.key">
          <section class="cal-month">
            <h3 x-text="month.label"></h3>
            <div class="cal-weekdays">
              <template x-for="name in weekdayHeaders" :key="name">
                <span x-text="name"></span>
              </template>
            </div>
            <div class="cal-grid">
              <template x-for="(cell, idx) in month.cells" :key="idx">
                <button
                  class="cal-cell"
                  :class="!cell ? 'empty' : {
                    'in-trip': cell.inTrip,
                    'active': cell.date === today,
                    'is-today': cell.date === realToday,
                    'travel': cell.day?.type === 'travel',
                    'stay': cell.day?.type === 'stay'
                  }"
                  :disabled="!cell || !cell.inTrip"
                  @click="cell && cell.inTrip && (pickDate(cell.date), showDayPicker = false)">
                  <template x-if="cell">
                    <span class="cal-dom" x-text="cell.dom"></span>
                  </template>
                  <template x-if="cell && cell.symbols.length">
                    <span class="cal-syms" x-text="cell.symbols.join('')"></span>
                  </template>
                </button>
              </template>
            </div>
          </section>
        </template>
      </div>
      <div class="sheet-footer">
        <button @click="resetDate(); showDayPicker = false" class="btn-secondary">Zurück zu heute</button>
      </div>
    </div>
  </div>

  <!-- Toast (outside <main> so position:fixed anchors to viewport, not to the animated main container) -->
  <div class="toast" x-show="toast.visible" x-transition.opacity x-text="toast.message" x-cloak></div>

  <!-- Bottom tab bar (app chrome) -->
  <nav class="tab-bar" x-show="view === 'main' && bundle" x-cloak aria-label="Modus">
    <button class="tab" :class="{ active: mode === 'transit' }" @click="setMode('transit')" :aria-pressed="mode === 'transit'">
      <span class="tab-icon" aria-hidden="true">🚗</span>
      <span class="tab-label">Unterwegs</span>
    </button>
    <button class="tab" :class="{ active: mode === 'explore' }" @click="setMode('explore')" :aria-pressed="mode === 'explore'">
      <span class="tab-icon" aria-hidden="true">🏖️</span>
      <span class="tab-label">Erleben</span>
    </button>
    <button class="tab" :class="{ active: mode === 'discover' }" @click="setMode('discover')" :aria-pressed="mode === 'discover'">
      <span class="tab-icon" aria-hidden="true">🗺️</span>
      <span class="tab-label">Entdecken</span>
    </button>
  </nav>
</body>
</html>
